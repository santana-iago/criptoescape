<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Laboratório educacional de aritmética modular e segurança em curvas elípticas.">
  <meta name="theme-color" content="#0b1220">
  <title>CriptoEscape — Laboratório educacional</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <script defer src="assets/js/math.js"></script>
  <script defer src="assets/data/scenarios.js"></script>
  <script defer src="assets/data/evaluations.js"></script>
  <script defer src="assets/js/i18n.js"></script>
  <script defer src="assets/js/storage.js"></script>
  <script defer src="assets/js/tests.js"></script>
  <script defer src="assets/js/app.js"></script>
</head>
<body>
  <a class="skip-link" href="#main-content" data-i18n="skip">Pular para o conteúdo</a>
  <div id="live-region" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="Navegação principal">
      <h1 class="brand">Cripto<span>Escape</span></h1>
      <p class="brand-sub" data-i18n="app.subtitle">Laboratório educacional de aritmética modular e segurança em curvas elípticas</p>

      <div class="sidebar-controls">
        <div class="compact-field">
          <label for="language-select" data-i18n="language">Idioma</label>
          <select id="language-select">
            <option value="pt-BR">Português (Brasil)</option>
            <option value="en">English</option>
            <option value="es">Español</option>
          </select>
        </div>
        <div class="compact-field" id="curve-control">
          <label for="curve-select" data-i18n="curve">Curva</label>
          <select id="curve-select"></select>
        </div>
        <div class="compact-field" id="scenario-control">
          <label for="scenario-select" data-i18n="scenario">Cenário</label>
          <select id="scenario-select"></select>
        </div>
      </div>

      <nav class="step-nav" id="step-nav" aria-label="Etapas da atividade"></nav>

      <section class="progress-card" aria-labelledby="progress-title">
        <h2 id="progress-title" data-i18n="nav.progress">Progresso da investigação</h2>
        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-labelledby="progress-title"><span id="progress-fill"></span></div>
        <p id="progress-text"></p>
      </section>

      <div class="sidebar-actions">
        <button class="button small" id="preferences-button" type="button" data-i18n="nav.settings">Preferências</button>
        <button class="button small" id="restart-button" type="button" data-i18n="nav.restart">Reiniciar</button>
      </div>
    </aside>

    <div class="main-column">
      <header class="mobile-bar">
        <button class="icon-button" id="menu-button" type="button" aria-controls="sidebar" aria-expanded="false" aria-label="Abrir navegação">☰</button>
        <div class="brand">Cripto<span>Escape</span></div>
        <div class="mobile-session" id="mobile-session"></div>
      </header>
      <main class="main-content" id="main-content" tabindex="-1"></main>
    </div>
  </div>

  <dialog id="entry-dialog" aria-labelledby="entry-title">
    <div class="dialog-body">
      <h2 id="entry-title" data-i18n="mode.choose">Como você quer usar o CriptoEscape?</h2>
      <p class="notice" data-i18n="privacy.notice">Os dados da atividade ficam somente neste navegador.</p>
      <div class="mode-options">
        <button type="button" class="mode-card" data-mode="free"><strong data-i18n="mode.free">Modo livre</strong><span data-i18n="mode.freeHelp"></span></button>
        <button type="button" class="mode-card" data-mode="student"><strong data-i18n="mode.student">Modo estudante</strong><span data-i18n="mode.studentHelp"></span></button>
        <button type="button" class="mode-card" data-mode="instructor"><strong data-i18n="mode.instructor">Instrutor / análise</strong><span data-i18n="mode.instructorHelp"></span></button>
      </div>
      <div class="field" id="class-code-field" hidden>
        <label for="class-code" data-i18n="classCode">Código da turma ou aplicação</label>
        <input id="class-code" type="text" maxlength="40" autocomplete="off" placeholder="Opcional">
      </div>
      <div class="button-row" id="student-entry-actions" hidden>
        <button class="button primary" id="student-continue" type="button" data-i18n="continue">Continuar</button>
        <button class="button" id="resume-session" type="button" hidden data-i18n="resume">Retomar sessão</button>
      </div>
    </div>
  </dialog>

  <dialog id="preferences-dialog" aria-labelledby="preferences-title">
    <form method="dialog" class="dialog-body" id="preferences-form">
      <h2 id="preferences-title" data-i18n="preferences.title">Preferências de acessibilidade</h2>
      <div class="field">
        <label for="text-size" data-i18n="preferences.textSize">Tamanho do texto</label>
        <select id="text-size">
          <option value="normal" data-i18n="preferences.normal">Normal</option>
          <option value="large" data-i18n="preferences.large">Grande</option>
          <option value="larger" data-i18n="preferences.larger">Muito grande</option>
        </select>
      </div>
      <label class="check-line"><input id="reduce-motion" type="checkbox"><span data-i18n="preferences.motion">Reduzir movimento</span></label>
      <label class="check-line"><input id="high-contrast" type="checkbox"><span data-i18n="preferences.contrast">Aumentar contraste</span></label>
      <label class="check-line"><input id="readable-font" type="checkbox"><span data-i18n="preferences.readable">Fonte de maior legibilidade</span></label>
      <label class="check-line"><input id="hide-decorations" type="checkbox"><span data-i18n="preferences.decorations">Ocultar elementos decorativos</span></label>
      <div class="button-row"><button class="button primary" value="close" data-i18n="preferences.close">Fechar preferências</button></div>
    </form>
  </dialog>

  <noscript>
    <p style="padding:2rem;color:#e8eef7;background:#0b1220">O CriptoEscape precisa de JavaScript habilitado para executar os cálculos locais.</p>
  </noscript>
</body>
</html>
